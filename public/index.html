<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Que Horas o Luiz Chega? 🕐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TASKBAR -->
<div class="taskbar">
  <button class="start-btn" onclick="toggleStartMenu()">
    <span class="start-logo">🪟</span> <strong>Iniciar</strong>
  </button>
  <div class="taskbar-apps" id="taskbar-apps"></div>
  <div class="taskbar-clock" id="taskbar-clock">00:00</div>
</div>

<!-- START MENU -->
<div class="start-menu" id="start-menu" style="display:none">
  <div class="start-menu-header">
    <span>LuizOS 95</span>
  </div>
  <div class="start-menu-items">
    <button onclick="openWindow('win-guess'); closeStartMenu()">🎯 Fazer Aposta</button>
    <button onclick="openWindow('win-today'); closeStartMenu(); loadToday()">📋 Apostas de Hoje</button>
    <button onclick="openWindow('win-history'); closeStartMenu(); loadHistory()">📅 Histórico</button>
    <button onclick="openWindow('win-rank'); closeStartMenu(); loadOverallRank()">🏆 Ranking Geral</button>
    <button onclick="openWindow('win-register'); closeStartMenu()">👤 Novo Usuário</button>
    <hr/>
    <button onclick="openWindow('win-admin'); closeStartMenu()">🔒 Admin</button>
  </div>
</div>

<!-- DESKTOP ICONS -->
<div class="desktop">
  <div class="desktop-icon" ondblclick="openWindow('win-guess')">
    <div class="icon-img">🎯</div>
    <div class="icon-label">Fazer Aposta</div>
  </div>
  <div class="desktop-icon" ondblclick="openWindow('win-today'); loadToday()">
    <div class="icon-img">📋</div>
    <div class="icon-label">Apostas de Hoje</div>
  </div>
  <div class="desktop-icon" ondblclick="openWindow('win-history'); loadHistory()">
    <div class="icon-img">📅</div>
    <div class="icon-label">Histórico</div>
  </div>
  <div class="desktop-icon" ondblclick="openWindow('win-rank'); loadOverallRank()">
    <div class="icon-img">🏆</div>
    <div class="icon-label">Ranking Geral</div>
  </div>
  <div class="desktop-icon" ondblclick="openWindow('win-register')">
    <div class="icon-img">👤</div>
    <div class="icon-label">Novo Usuário</div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: FAZER APOSTA
══════════════════════════════════════════ -->
<div class="win95-window" id="win-guess" style="left:80px;top:60px;width:400px">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-guess')">
    <span class="win95-title">🎯 Fazer Aposta</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-guess')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-guess')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div class="win95-status-bar" id="guess-status-banner"></div>

    <div class="field-group">
      <label>Quem é você?</label>
      <select id="guess-user-select" onchange="loadUserPhoto()">
        <option value="">-- Selecione --</option>
      </select>
    </div>

    <div class="user-photo-area" id="user-photo-area" style="display:none">
      <img id="user-photo" src="" alt="Foto" />
    </div>

    <div class="field-group">
      <label>Senha:</label>
      <input type="password" id="guess-password" placeholder="Sua senha" />
    </div>

    <div class="field-group">
      <label>Que horas o Luiz vai chegar?</label>
      <input type="time" id="guess-time" value="09:00" min="06:00" max="13:00" />
    </div>

    <div class="btn-row">
      <button class="win95-action-btn" onclick="submitGuess()">📨 Apostar!</button>
    </div>

    <div class="win95-msg" id="guess-msg"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: APOSTAS DE HOJE
══════════════════════════════════════════ -->
<div class="win95-window" id="win-today" style="left:120px;top:100px;width:480px;display:none">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-today')">
    <span class="win95-title">📋 Apostas de Hoje</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-today')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-today')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div id="today-content">
      <div class="loading">Carregando...</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: HISTÓRICO
══════════════════════════════════════════ -->
<div class="win95-window" id="win-history" style="left:160px;top:80px;width:520px;display:none">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-history')">
    <span class="win95-title">📅 Histórico de Chegadas</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-history')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-history')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div id="history-content">
      <div class="loading">Carregando...</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: RANKING GERAL
══════════════════════════════════════════ -->
<div class="win95-window" id="win-rank" style="left:200px;top:60px;width:460px;display:none">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-rank')">
    <span class="win95-title">🏆 Ranking Geral</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-rank')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-rank')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div id="rank-content">
      <div class="loading">Carregando...</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: NOVO USUÁRIO
══════════════════════════════════════════ -->
<div class="win95-window" id="win-register" style="left:250px;top:120px;width:360px;display:none">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-register')">
    <span class="win95-title">👤 Novo Usuário</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-register')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-register')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div class="field-group">
      <label>Nome:</label>
      <input type="text" id="reg-name" placeholder="Seu nome" />
    </div>
    <div class="field-group">
      <label>Senha:</label>
      <input type="password" id="reg-password" placeholder="Escolha uma senha" />
    </div>
    <div class="btn-row">
      <button class="win95-action-btn" onclick="registerUser()">✅ Criar Conta</button>
    </div>
    <div class="win95-msg" id="reg-msg"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: ADMIN
══════════════════════════════════════════ -->
<div class="win95-window" id="win-admin" style="left:300px;top:80px;width:380px;display:none">
  <div class="win95-titlebar" onmousedown="startDrag(event,'win-admin')">
    <span class="win95-title">🔒 Painel Admin</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="minimizeWindow('win-admin')">_</button>
      <button class="win95-btn-ctrl" onclick="closeWindow('win-admin')">✕</button>
    </div>
  </div>
  <div class="win95-body">
    <div id="admin-login-panel">
      <p style="color:#800000;font-weight:bold">⚠️ Área Restrita</p>
      <div class="field-group">
        <label>Senha Admin:</label>
        <input type="password" id="admin-password" placeholder="Senha secreta" />
      </div>
      <div class="btn-row">
        <button class="win95-action-btn" onclick="adminLogin()">🔓 Entrar</button>
      </div>
      <div class="win95-msg" id="admin-login-msg"></div>
    </div>

    <div id="admin-panel" style="display:none">
      <p><strong>Registrar chegada do Luiz</strong></p>
      <div class="field-group">
        <label>Data (deixe vazio para hoje):</label>
        <input type="date" id="admin-date" />
      </div>
      <div class="field-group">
        <label>Horário de chegada:</label>
        <input type="time" id="admin-arrival-time" />
      </div>
      <div class="btn-row">
        <button class="win95-action-btn" onclick="setArrival()">📍 Registrar Chegada</button>
      </div>
      <div class="win95-msg" id="admin-msg"></div>
      <hr/>
      <div id="admin-result"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     WINDOW: RESULTADO (popup)
══════════════════════════════════════════ -->
<div class="win95-window win95-dialog" id="win-result" style="left:50%;top:50%;transform:translate(-50%,-50%);width:360px;display:none;z-index:9999">
  <div class="win95-titlebar">
    <span class="win95-title" id="result-title">Resultado</span>
    <div class="win95-controls">
      <button class="win95-btn-ctrl" onclick="closeWindow('win-result')">✕</button>
    </div>
  </div>
  <div class="win95-body" id="result-body"></div>
</div>

<script src="app.js"></script>
</body>
</html>
